<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94B"/>
      <stop offset="100%" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gc)" stroke-width="2"/>
  <!-- Cross / Plus medical symbol -->
  <rect x="85" y="45" width="30" height="90" rx="5" fill="url(#gc)"/>
  <rect x="55" y="75" width="90" height="30" rx="5" fill="url(#gc)"/>
  <!-- Heart rate line -->
  <polyline points="30,140 60,140 70,125 80,155 90,130 100,145 110,140 170,140"
    fill="none" stroke="url(#gc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
